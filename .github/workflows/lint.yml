name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            src/**/*.md
          config: ".markdownlint.yml"

  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install mdbook
        run: cargo install mdbook

      - name: Generate site (auto_index + mdbook)
        run: ./update.sh

      - uses: lycheeverse/lychee-action@v2
        with:
          # Run lychee against the generated HTML in `book/` so links resolve correctly
          args: --exclude-loopback --exclude "facebook.com" "book/**/*.html"

  test-auto-index:
    runs-on: ubuntu-latest
    name: Test Auto Index
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --manifest-path scripts/auto_index/Cargo.toml
