name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            src/**/*.md
          config: ".markdownlint.yml"

  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --exclude-loopback --exclude "facebook.com" src/**/*.md

  test-auto-index:
    runs-on: ubuntu-latest
    name: Test Auto Index
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --manifest-path scripts/auto_index/Cargo.toml
